<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador CIMA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Buscador de medicamentos CIMA</h1>
        <p>
          Consulta medicamentos por principio activo, nombre comercial o código
          ATC y accede a ficha técnica y prospecto.
        </p>
      </header>

      <section class="search-card">
        <form id="search-form" autocomplete="off">
          <div class="field-grid">
            <label>
              Tipo de búsqueda
              <select id="search-type" required>
                <option value="nombre">Nombre comercial</option>
                <option value="principioActivo">Principio activo</option>
                <option value="atc">Código ATC</option>
              </select>
            </label>

            <label>
              Valor
              <input
                id="search-value"
                name="search"
                type="text"
                list="search-suggestions"
                placeholder="Escribe para buscar"
                minlength="2"
                required
              />
              <datalist id="search-suggestions"></datalist>
            </label>
          </div>

          <button id="search-button" type="submit">Buscar</button>
        </form>
      </section>

      <section>
        <p id="status" role="status" aria-live="polite"></p>
        <div id="results" class="results"></div>
      </section>
    </main>

    <template id="medicine-card-template">
      <article class="medicine-card">
        <h2 class="medicine-name"></h2>
        <dl class="medicine-meta"></dl>
        <div class="docs"></div>
      </article>
    </template>

    <script src="script.js" defer></script>
  </body>
</html>
